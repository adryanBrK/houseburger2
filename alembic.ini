# =================================================================
# alembic.ini — configuração do Alembic
# Este arquivo deve ficar na RAIZ do projeto (mesma pasta de main.py)
# =================================================================

[alembic]
# Caminho para a pasta de migrations, relativo a este arquivo
script_location = alembic

# Formato dos nomes dos arquivos de migration
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .

# IMPORTANTE: Deixe esta linha em BRANCO ou com placeholder.
# A DATABASE_URL real é carregada pelo env.py via python-dotenv.
# Se você colocar uma URL aqui, o Alembic vai usá-la E IGNORAR o env.py.
sqlalchemy.url =

path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
